# MkDocs configuration — Retro Game Coders / IDE educational docs
# https://squidfunk.github.io/mkdocs-material/
#
# Build:   mkdocs build    → output in ./site/
# Preview: mkdocs serve    → http://127.0.0.1:8000
#
# TRSE method pages under trse/reference/methods/ are generated — run:
#   python3 scripts/import_trse_reference.py
# before mkdocs build (see deploy.sh).

site_name: Retro Game Coders Docs

site_description: Educational documentation for retro programming — IDE, TRSE, assembly, C, BASIC, and more.
site_author: Retro Game Coders

# Canonical URL (sitemap, social cards). Production:
site_url: https://docs.retrogamecoders.com/

repo_url: https://github.com/omiq/TRSE
repo_name: TRSE (upstream reference)

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - IDE:
      - ide/getting-started.md
  - Platforms:
      - platforms/index.md
      - "Commodore 64": platforms/c64.md
      - "VIC-20": platforms/vic20.md
      - "Commodore PET": platforms/pet.md
      - "BBC Micro": platforms/bbc-micro.md
      - "ZX Spectrum": platforms/zx-spectrum.md
      - "ZX81": platforms/zx81.md
      - "Amstrad CPC6128": platforms/cpc.md
      - "MSX": platforms/msx.md
      - "NES / Famicom": platforms/nes.md
      - "Atari 8-bit": platforms/atari8.md
      - "Apple II": platforms/apple2.md
      - "Dragon 32 / CoCo 2": platforms/dragon-coco.md
      - "Vectrex": platforms/vectrex.md
      - "Sega Master System / Game Gear": platforms/sega.md
      - "x86 / DOSBox": platforms/x86.md
  - Assembly:
      - assembly/index.md
      - "6502 assembly": assembly/6502.md
      - "Z80 assembly": assembly/z80.md
      - "6809 assembly": assembly/6809.md
  - C:
      - c/index.md
      - "cc65 (6502)": c/cc65.md
      - "z88dk (Z80)": c/z88dk.md
      - "CMOC (6809)": c/cmoc.md
  - BASIC:
      - basic/index.md
      - "Commodore BASIC V2": basic/commodore-basic-v2.md
      - "XC-BASIC 3": basic/xc-basic-3.md
      - "BBC BASIC": basic/bbc-basic.md
      - "ZX BASIC (Boriel)": basic/zx-basic.md
      - "Color BASIC": basic/color-basic.md
  - TRSE:
      - trse/index.md
      - "The TRSE language": trse/language.md
      - "Methods (reference)": trse/reference/methods-index.md
      - trse/help-import.md
  - Maintaining this site: MAINTAINING.md

extra:
  # Header logo links to main community site (docs canonical URL stays site_url)
  homepage: https://retrogamecoders.com/
  social:
    - icon: fontawesome/solid/house
      link: https://retrogamecoders.com/
      name: Retro Game Coders
    - icon: fontawesome/solid/laptop-code
      link: https://ide.retrogamecoders.com/
      name: Web IDE
    - icon: fontawesome/solid/users
      link: https://retrogamecoders.com/community/
      name: Community

copyright: Copyright &copy; Retro Game Coders
