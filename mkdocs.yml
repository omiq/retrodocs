# MkDocs configuration — Retro Game Coders / IDE educational docs
# https://squidfunk.github.io/mkdocs-material/
#
# Build:   mkdocs build    → output in ./site/
# Preview: mkdocs serve    → http://127.0.0.1:8000

site_name: Retro Game Coders Docs
site_description: Educational documentation for retro programming — IDE, TRSE, assembly, C, BASIC, and more.
site_author: Retro Game Coders

# If you later host at a subpath, set e.g. docs_dir trailing path:
# site_url: https://ide.retrogamecoders.com/docs/

repo_url: https://github.com/omiq/TRSE
repo_name: TRSE (upstream reference)

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - TRSE:
      - trse/index.md
      - trse/help-import.md
  - Assembly: assembly/index.md
  - C: c/index.md
  - BASIC: basic/index.md
  - Maintaining this site: MAINTAINING.md

extra:
  social:
    - icon: fontawesome/solid/book
      link: https://ide.retrogamecoders.com
      name: IDE
