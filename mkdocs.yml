# MkDocs configuration — Retro Game Coders / IDE educational docs
# https://squidfunk.github.io/mkdocs-material/
#
# Build:   mkdocs build    → output in ./site/
# Preview: mkdocs serve    → http://127.0.0.1:8000
#
# TRSE method pages under trse/reference/methods/ are generated — run:
#   python3 scripts/import_trse_reference.py
# before mkdocs build (see deploy.sh).

site_name: Retro Game Coders Docs

site_description: Educational documentation for retro programming — IDE, TRSE, assembly, C, BASIC, and more.
site_author: Retro Game Coders

# Canonical URL (sitemap, social cards). Production:
site_url: https://docs.retrogamecoders.com/

repo_url: https://github.com/omiq/TRSE
repo_name: TRSE (upstream reference)

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - TRSE:
      - trse/index.md
      - "Methods (reference)": trse/reference/methods-index.md
      - trse/help-import.md
  - Assembly: assembly/index.md
  - C: c/index.md
  - BASIC: basic/index.md
  - Maintaining this site: MAINTAINING.md

extra:
  # Header logo links to main community site (docs canonical URL stays site_url)
  homepage: https://retrogamecoders.com/
  social:
    - icon: fontawesome/solid/house
      link: https://retrogamecoders.com/
      name: Retro Game Coders
    - icon: fontawesome/solid/laptop-code
      link: https://ide.retrogamecoders.com/
      name: Web IDE
    - icon: fontawesome/solid/users
      link: https://retrogamecoders.com/community/
      name: Community

copyright: Copyright &copy; Retro Game Coders
